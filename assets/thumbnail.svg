<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="16" fill="#1e2029"/>

  <!-- Plugin name - two lines, large and readable -->
  <text x="128" y="52" fill="#c8d6e5" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle" letter-spacing="0.5">LG Monitor</text>
  <text x="128" y="82" fill="#c8d6e5" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle" letter-spacing="0.5">Controls</text>

  <!-- Row of 4 feature icons, centered, y=110-170 -->

  <!-- Icon 1: Input Switch (monitor + arrow) — green -->
  <g transform="translate(16, 104) scale(0.75)">
    <rect x="8" y="12" width="56" height="36" rx="3" fill="none" stroke="#9fd2a7" stroke-width="3.5"/>
    <line x1="36" y1="48" x2="36" y2="56" stroke="#9fd2a7" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="24" y1="56" x2="48" y2="56" stroke="#9fd2a7" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="22" y1="30" x2="44" y2="30" stroke="#9fd2a7" stroke-width="3" stroke-linecap="round"/>
    <polyline points="38,24 44,30 38,36" fill="none" stroke="#9fd2a7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Icon 2: Brightness (sun) — gold -->
  <g transform="translate(72, 104) scale(0.75)">
    <circle cx="36" cy="36" r="10" fill="none" stroke="#e3c165" stroke-width="3.5"/>
    <line x1="36" y1="10" x2="36" y2="19" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="53" x2="36" y2="62" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="36" x2="19" y2="36" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="53" y1="36" x2="62" y2="36" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="16.6" y1="16.6" x2="22.9" y2="22.9" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="49.1" y1="49.1" x2="55.4" y2="55.4" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="55.4" y1="16.6" x2="49.1" y2="22.9" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
    <line x1="22.9" y1="49.1" x2="16.6" y2="55.4" stroke="#e3c165" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Icon 3: Volume (speaker) — blue -->
  <g transform="translate(128, 104) scale(0.75)">
    <path d="M16,28 L26,28 L38,18 L38,54 L26,44 L16,44 Z" fill="#7eb8da"/>
    <path d="M46,28 Q52,36 46,44" fill="none" stroke="#7eb8da" stroke-width="3" stroke-linecap="round"/>
    <path d="M52,22 Q62,36 52,50" fill="none" stroke="#7eb8da" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Icon 4: Contrast (split circle) — white -->
  <g transform="translate(184, 104) scale(0.75)">
    <circle cx="36" cy="36" r="22" fill="none" stroke="white" stroke-width="3.5"/>
    <path d="M36,14 A22,22 0 0,1 36,58 Z" fill="white"/>
  </g>

  <!-- Subtitle -->
  <text x="128" y="200" fill="#6b7280" font-family="sans-serif" font-size="13" text-anchor="middle">DDC/CI via ddcutil</text>

  <!-- Accent line -->
  <line x1="64" y1="218" x2="192" y2="218" stroke="#9fd2a7" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
