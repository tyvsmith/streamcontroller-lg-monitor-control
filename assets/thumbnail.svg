<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="24" fill="#1a1a2e"/>
  <!-- Monitor body -->
  <rect x="48" y="52" width="160" height="100" rx="8" ry="8" fill="none" stroke="white" stroke-width="6"/>
  <!-- Monitor stand -->
  <line x1="128" y1="152" x2="128" y2="176" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="88" y1="176" x2="168" y2="176" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Split line (PBP) -->
  <line x1="128" y1="62" x2="128" y2="142" stroke="#9fd2a7" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,6"/>
  <!-- Controls dots at bottom -->
  <circle cx="88" cy="212" r="12" fill="#9fd2a7"/>
  <circle cx="128" cy="212" r="12" fill="#e3c165"/>
  <circle cx="168" cy="212" r="12" fill="white"/>
</svg>
