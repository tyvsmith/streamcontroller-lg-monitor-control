name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Lint
        run: uv run --group ci ruff check .

      - name: Format check
        run: uv run --group ci ruff format --check .

      - name: Type check
        run: uv run --group ci pyright

      - name: Test
        run: uv run --group ci pytest tests/ -v
